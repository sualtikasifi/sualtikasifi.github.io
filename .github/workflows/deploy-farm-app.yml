name: Deploy Farm App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "farm-app/**"
      - ".github/workflows/deploy-farm-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: farm-app/package-lock.json
      - name: Install dependencies
        working-directory: farm-app
        run: npm ci
      - name: Build
        working-directory: farm-app
        run: npm run build
      - name: Disable Jekyll processing
        run: touch farm-app/out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: farm-app/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
