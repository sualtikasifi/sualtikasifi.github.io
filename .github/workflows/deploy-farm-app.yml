name: Deploy Farm App to GitHub Pages

# This repo is a <user>.github.io repo, which GitHub auto-enables Pages for
# with source "Deploy from a branch: main / (root)" the moment it's created.
# That legacy branch-based Jekyll build keeps running on every push and wins
# over an Actions-based Pages deployment, so instead of fighting it we build
# farm-app and publish the compiled output directly into the repo root (the
# branch/path Pages is actually configured to serve), with a .nojekyll file
# so GitHub serves it as static files instead of Jekyll-processing it.

on:
  push:
    branches: [main]
    paths:
      - "farm-app/**"
      - ".github/workflows/deploy-farm-app.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: farm-app/package-lock.json
      - name: Install dependencies
        working-directory: farm-app
        run: npm ci
      - name: Build
        working-directory: farm-app
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://zxedysamcbeytikhqpii.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_2DNgRqokZEzOO_CcYO7Fgg_gIJFV8lt
        run: npm run build
      - name: Publish build output to repo root
        run: |
          set -eu
          find . -maxdepth 1 -mindepth 1 \
            ! -name farm-app \
            ! -name .github \
            ! -name .git \
            ! -name README.md \
            ! -name app-ads.txt \
            ! -name .gitignore \
            -exec rm -rf {} +
          cp -r farm-app/out/. .
          touch .nojekyll
      - name: Commit and push published site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Publish farm-app build output"
            git push
          else
            echo "No changes to publish"
          fi
